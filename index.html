<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./src/main.js"></script>
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Document</title>
  </head>
  <body>
    <div id="draggable" class="circle" draggable="true">drag me</div>
    <div class="circle" id="sine">Sine</div>
    <div class="container">

      <div class="controls">
        <fieldset id="speed-controls">
          <legend>Speed controls</legend>
          <div class="stack">
            <label id="speed-display"></label>
            <button id="speed-up">Increase</button>
            <button id="speed-down">Decrease</button>
            <button id="reset">Reset</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Controls</legend>
          <div class="stack">
            <button id="add-circle">Add circle</button>
          </div>
        </fieldset>
      </div>

      <div class="weather-component">
        <h2>Ørsta</h2>
        <div>
          <img
            src="https://www.xweather.com/docs/_next/static/media/sunny.6a4b36a4.png?dpl=dpl_Aj6B5LUFi4NmN2NNNMuj9VPj7zYc"
            width="56px"
          />
          <p class="temp">10c</p>
          <p class="feels-like"></p>
        </div>
        <button id="refresh"">Refresh</button>
      </div>

      <div class="hue-shift-container" draggable="false"></div>




    </div>



  </body>
</html>
